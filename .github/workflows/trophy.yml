name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy image
        run: |
          curl -f -o dist/trophy.svg "https://github-profile-trophy.vercel.app/?username=ayushxdev01&theme=nightfall&no-frame=true&no-bg=true&margin-w=10&row=1"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/trophy.svg
          git diff --staged --quiet || git commit -m "Update trophy image"
          git pull --rebase origin main
          git push
